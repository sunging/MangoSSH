# CI validates every proposed change. A successfully verified debug APK is
# delivered for commits merged to main, without requiring release-signing secrets.
name: Android CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

# The workflow only needs to read this repository. Artifact uploads do not need
# extra repository permissions.
permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-deliver:
    name: Verify and deliver debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # The GPL-licensed Mosh source remains reproducible through the submodule.
      - name: Check out source and native Mosh source
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      # Git preserves Windows checkout permissions, so restore the executable bit
      # required by the Linux runner before invoking the wrapper.
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Test, lint, and package debug APK
        run: ./gradlew --no-daemon :app:testDebugUnitTest :app:lint :app:assembleDebug

      # This is continuous delivery of an installable debug artifact. A signed
      # production release must be added separately with repository secrets.
      - name: Upload verified debug APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v6
        with:
          name: MangoSSH-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
