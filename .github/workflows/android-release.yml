# Signed releases are generated only from version tags. The signing key is
# restored from GitHub Secrets into the ephemeral runner and never committed.
name: Android signed release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Required for creating a GitHub Release and attaching signed APK/AAB assets.
permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sign-and-publish:
    name: Sign and publish Android release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source and native Mosh source
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Restore release signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          for secret_name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD; do
            if [[ -z "${!secret_name}" ]]; then
              echo "::error::$secret_name is not configured"
              exit 1
            fi
          done
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/mangossh-release.keystore"
          test -s "$RUNNER_TEMP/mangossh-release.keystore"

      - name: Test, lint, and build signed APK and AAB
        env:
          MANGOSSH_RELEASE_STORE_FILE: ${{ runner.temp }}/mangossh-release.keystore
          MANGOSSH_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MANGOSSH_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MANGOSSH_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:testDebugUnitTest :app:lint :app:assembleRelease :app:bundleRelease

      - name: Verify signed APK and 16 KiB native alignment
        run: |
          build_tools_dir="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          test -x "$build_tools_dir/apksigner"
          test -x "$build_tools_dir/zipalign"
          "$build_tools_dir/apksigner" verify --verbose app/build/outputs/apk/release/app-release.apk
          "$build_tools_dir/zipalign" -c -P 16 -v 4 app/build/outputs/apk/release/app-release.apk
          bash tools/check-16kb-elf-wsl.sh app/build/outputs/apk/release/app-release.apk

      - name: Upload signed APK and AAB
        uses: actions/upload-artifact@v6
        with:
          name: MangoSSH-signed-${{ github.sha }}
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 90

      # Manual dispatch validates signing without creating a release. A pushed
      # version tag creates a matching GitHub Release containing both artifacts.
      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/bundle/release/app-release.aab
